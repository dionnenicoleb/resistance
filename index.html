<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dionne's Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; min-height: 100vh; padding: 1rem; color: #1a1a1a; }

  #pin-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 1rem; }
  #pin-screen h2 { font-size: 18px; font-weight: 500; color: #1a1a1a; }
  #pin-screen input { width: 120px; padding: 10px; text-align: center; font-size: 22px; letter-spacing: 8px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 10px; background: white; outline: none; }
  #pin-screen input:focus { border-color: rgba(0,0,0,0.4); }
  #pin-error { font-size: 13px; color: #D85A30; min-height: 18px; }

  #app { display: none; }

  .top-bar { display: flex; justify-content: space-between; align-items: center; max-width: 900px; margin: 0 auto 1.5rem; }
  h1 { font-size: 20px; font-weight: 500; color: #1a1a1a; }
  .export-btn { padding: 7px 14px; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 8px; background: white; font-size: 13px; cursor: pointer; color: #555; }
  .export-btn:hover { background: #f0f0ec; }

  .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; max-width: 900px; margin: 0 auto; }
  @media (max-width: 600px) { .layout { grid-template-columns: 1fr; } }
  .section { background: white; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.1); padding: 1.25rem; }
  .section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.75rem; }
  .recurring-label { color: #0F6E56; }
  .resistance-label { color: #993C1D; }
  .add-row { display: flex; gap: 8px; margin-bottom: 1rem; }
  .add-row input { flex: 1; padding: 8px 10px; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 8px; font-size: 14px; background: #fafaf8; outline: none; }
  .add-row input:focus { border-color: rgba(0,0,0,0.3); }
  .add-row button { padding: 8px 14px; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 8px; background: white; font-size: 14px; cursor: pointer; white-space: nowrap; }
  .add-row button:hover { background: #f5f4f0; }
  .goal-row { display: flex; gap: 8px; margin-bottom: 1rem; align-items: center; }
  .goal-row label { font-size: 12px; color: #666; white-space: nowrap; }
  .goal-row input { width: 70px; padding: 6px 8px; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 8px; font-size: 13px; background: #fafaf8; outline: none; }
  .habit-item { border: 0.5px solid rgba(0,0,0,0.08); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
  .habit-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .habit-name { font-size: 14px; font-weight: 500; }
  .habit-count { font-size: 22px; font-weight: 500; color: #0F6E56; line-height: 1; }
  .habit-goal { font-size: 11px; color: #888; }
  .progress-bar { height: 4px; background: #e8e8e4; border-radius: 2px; margin: 6px 0 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: #1D9E75; border-radius: 2px; transition: width 0.3s; }
  .habit-actions { display: flex; gap: 6px; }
  .log-btn { flex: 1; padding: 7px; border: 0.5px solid #1D9E75; border-radius: 8px; background: white; color: #0F6E56; font-size: 13px; font-weight: 500; cursor: pointer; }
  .log-btn:hover { background: #E1F5EE; }
  .log-btn:active { transform: scale(0.97); }
  .del-btn { padding: 7px 10px; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 8px; background: white; color: #999; font-size: 13px; cursor: pointer; }
  .del-btn:hover { color: #E24B4A; border-color: #E24B4A; }
  .resistance-item { border: 0.5px solid rgba(0,0,0,0.08); border-radius: 10px; padding: 12px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 10px; }
  .check-btn { width: 22px; height: 22px; min-width: 22px; border-radius: 50%; border: 1.5px solid #D85A30; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 1px; font-size: 12px; font-weight: 700; color: white; }
  .check-btn:hover { background: #FAECE7; }
  .resistance-body { flex: 1; }
  .resistance-name { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .resistance-age { font-size: 11px; color: #D85A30; }
  .r-del-btn { padding: 4px 8px; border: none; background: none; color: #ccc; font-size: 16px; cursor: pointer; line-height: 1; }
  .r-del-btn:hover { color: #E24B4A; }
  .done-section { margin-top: 1.25rem; border-top: 0.5px solid rgba(0,0,0,0.08); padding-top: 1rem; }
  .done-header { font-size: 11px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; color: #aaa; margin-bottom: 0.5rem; }
  .done-item { font-size: 13px; color: #999; padding: 4px 0; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .done-item span { text-decoration: line-through; }
  .done-item em { font-style: normal; font-size: 11px; color: #bbb; white-space: nowrap; }
  .empty { font-size: 13px; color: #bbb; padding: 1rem 0; text-align: center; }
  .loading { font-size: 13px; color: #bbb; padding: 1rem 0; text-align: center; }
  .status { font-size: 11px; color: #bbb; text-align: center; padding: 0.5rem 0; max-width: 900px; margin: 0 auto; }
  .status.error { color: #D85A30; }
  .confetti-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; overflow: hidden; }
  .confetti-piece { position: absolute; width: 8px; height: 8px; border-radius: 2px; animation: fall 1.2s ease-in forwards; }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<div id="pin-screen">
  <h2>Enter your PIN</h2>
  <input type="password" id="pin-input" maxlength="4" inputmode="numeric" placeholder="••••" autofocus />
  <div id="pin-error"></div>
</div>

<div id="app">
  <div class="top-bar">
    <h1>Your tracker</h1>
    <button class="export-btn" onclick="exportCSV()">Export data</button>
  </div>
  <div class="layout">
    <div class="section">
      <div class="section-label recurring-label">Recurring habits</div>
      <div class="add-row">
        <input type="text" id="hab-name" placeholder="Add a habit..." />
      </div>
      <div class="goal-row">
        <label for="hab-goal">Goal (times):</label>
        <input type="number" id="hab-goal" value="30" min="1" />
        <button onclick="addHabit()">Add</button>
      </div>
      <div id="habits-list"><div class="loading">Loading...</div></div>
    </div>
    <div class="section">
      <div class="section-label resistance-label">Resistance list</div>
      <div style="font-size: 12px; color: #999; margin-bottom: 0.75rem;">Life-changing things you keep avoiding</div>
      <div class="add-row">
        <input type="text" id="res-name" placeholder="What are you avoiding?" />
        <button onclick="addResistance()">Add</button>
      </div>
      <div id="resistance-list"><div class="loading">Loading...</div></div>
      <div class="done-section" id="done-section" style="display:none;">
        <div class="done-header">Conquered</div>
        <div id="done-list"></div>
      </div>
    </div>
  </div>
  <div class="status" id="status"></div>
</div>

<div class="confetti-wrap" id="confetti-wrap"></div>

<script>
const CORRECT_PIN = '0808';

function checkPin(val) {
  if (val.length < 4) return;
  if (val === CORRECT_PIN) {
    sessionStorage.setItem('dn_auth', '1');
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('pin-error').textContent = 'Wrong PIN';
    document.getElementById('pin-input').value = '';
    setTimeout(() => document.getElementById('pin-error').textContent = '', 1500);
  }
}

if (sessionStorage.getItem('dn_auth') === '1') {
  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

document.getElementById('pin-input').addEventListener('input', e => checkPin(e.target.value));

const SUPABASE_URL = 'https://jrinudnvlxnhzjvtgdfd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_t6G8NAqGoGFW1Pe97AA-xw_mL0zd4r-';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let habits = [], resistance = [], done = [];

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' error' : '');
  if (!isError && msg) setTimeout(() => el.textContent = '', 2000);
}

function daysSince(dateStr) {
  if (!dateStr) return '';
  const added = new Date(dateStr);
  const addedMidnight = new Date(added.getFullYear(), added.getMonth(), added.getDate());
  const todayMidnight = new Date();
  todayMidnight.setHours(0, 0, 0, 0);
  const days = Math.round((todayMidnight - addedMidnight) / 86400000);
  if (days === 0) return 'added today';
  if (days === 1) return '1 day sitting';
  return days + ' days sitting';
}

async function loadAll() {
  const { data, error } = await db.from('tasks').select('*').order('added', { ascending: true });
  if (error) { setStatus('Could not load: ' + error.message, true); return; }
  habits = data.filter(x => x.type === 'habit');
  resistance = data.filter(x => x.type === 'resistance' && !x.completed);
  done = data.filter(x => x.type === 'resistance' && x.completed).sort((a,b) => new Date(b.completed) - new Date(a.completed));
  renderHabits();
  renderResistance();
}

async function exportCSV() {
  const { data, error } = await db.from('tasks').select('*').order('added', { ascending: true });
  if (error) { setStatus('Export failed', true); return; }
  const rows = [['type', 'name', 'goal', 'count', 'added', 'completed', 'days_sitting']];
  data.forEach(r => {
    const days = r.added ? Math.round((new Date().setHours(0,0,0,0) - new Date(new Date(r.added).toDateString()).getTime()) / 86400000) : '';
    rows.push([
      r.type || '',
      '"' + (r.name || '').replace(/"/g, '""') + '"',
      r.goal || '',
      r.count || 0,
      r.added ? new Date(r.added).toLocaleDateString() : '',
      r.completed ? new Date(r.completed).toLocaleDateString() : '',
      days
    ]);
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'dionne-tracker-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  setStatus('Exported');
}

async function addHabit() {
  const name = document.getElementById('hab-name').value.trim();
  const goal = parseInt(document.getElementById('hab-goal').value) || 30;
  if (!name) return;
  const { data, error } = await db.from('tasks').insert({ type: 'habit', name, goal, count: 0 }).select().single();
  if (error) { setStatus('Could not add habit', true); return; }
  document.getElementById('hab-name').value = '';
  habits.push(data);
  renderHabits();
}

async function logHabit(id) {
  const h = habits.find(x => x.id === id);
  if (!h) return;
  const newCount = (h.count || 0) + 1;
  const { error } = await db.from('tasks').update({ count: newCount }).eq('id', id);
  if (error) { setStatus('Could not log', true); return; }
  h.count = newCount;
  fireConfetti();
  renderHabits();
}

async function deleteHabit(id) {
  await db.from('tasks').delete().eq('id', id);
  habits = habits.filter(x => x.id !== id);
  renderHabits();
}

async function addResistance() {
  const name = document.getElementById('res-name').value.trim();
  if (!name) return;
  const { data, error } = await db.from('tasks').insert({ type: 'resistance', name }).select().single();
  if (error) { setStatus('Could not add', true); return; }
  document.getElementById('res-name').value = '';
  resistance.push(data);
  renderResistance();
}

async function completeResistance(id) {
  const now = new Date().toISOString();
  const { error } = await db.from('tasks').update({ completed: now }).eq('id', id);
  if (error) { setStatus('Could not complete', true); return; }
  const item = resistance.find(x => x.id === id);
  resistance = resistance.filter(x => x.id !== id);
  if (item) { item.completed = now; done.unshift(item); }
  fireConfetti();
  renderResistance();
}

async function deleteResistance(id) {
  await db.from('tasks').delete().eq('id', id);
  resistance = resistance.filter(x => x.id !== id);
  renderResistance();
}

function renderHabits() {
  const el = document.getElementById('habits-list');
  if (!habits.length) { el.innerHTML = '<div class="empty">No habits yet</div>'; return; }
  el.innerHTML = habits.map(h => {
    const pct = Math.min(100, Math.round(((h.count || 0) / h.goal) * 100));
    return `<div class="habit-item">
      <div class="habit-top">
        <div class="habit-name">${h.name}</div>
        <div style="text-align:right">
          <div class="habit-count">${h.count || 0}</div>
          <div class="habit-goal">of ${h.goal}</div>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="habit-actions">
        <button class="log-btn" onclick="logHabit('${h.id}')">+ Log one</button>
        <button class="del-btn" onclick="deleteHabit('${h.id}')">×</button>
      </div>
    </div>`;
  }).join('');
}

function renderResistance() {
  const el = document.getElementById('resistance-list');
  if (!resistance.length) {
    el.innerHTML = '<div class="empty">Nothing here — or nothing yet</div>';
  } else {
    el.innerHTML = resistance.map(r => `
      <div class="resistance-item">
        <button class="check-btn" onclick="completeResistance('${r.id}')"></button>
        <div class="resistance-body">
          <div class="resistance-name">${r.name}</div>
          <div class="resistance-age">${daysSince(r.added)}</div>
        </div>
        <button class="r-del-btn" onclick="deleteResistance('${r.id}')">×</button>
      </div>`).join('');
  }
  const doneSection = document.getElementById('done-section');
  const doneList = document.getElementById('done-list');
  if (done.length) {
    doneSection.style.display = 'block';
    doneList.innerHTML = done.slice(0, 10).map(d => `
      <div class="done-item">
        <span>${d.name}</span>
        <em>${daysSince(d.added)} before done</em>
      </div>`).join('');
  } else {
    doneSection.style.display = 'none';
  }
}

function fireConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  const colors = ['#1D9E75','#D85A30','#378ADD','#BA7517','#D4537E','#639922'];
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = '-10px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDelay = Math.random() * 0.4 + 's';
    p.style.animationDuration = (0.9 + Math.random() * 0.6) + 's';
    wrap.appendChild(p);
    setTimeout(() => p.remove(), 1800);
  }
}

document.addEventListener('keydown', e => {
  if (document.getElementById('app').style.display === 'block') {
    if (e.target.id === 'hab-name' && e.key === 'Enter') addHabit();
    if (e.target.id === 'res-name' && e.key === 'Enter') addResistance();
  }
});

if (sessionStorage.getItem('dn_auth') === '1') loadAll();
</script>
</body>
</html>
